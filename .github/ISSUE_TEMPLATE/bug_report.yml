name: Bug report
description: Report something that is not working correctly.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please do not include personal information, private YouTube account details, or sensitive browser data.
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: Describe the expected behavior.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
      placeholder: Describe what went wrong.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to...
        2. Click...
        3. See...
    validations:
      required: true
  - type: input
    id: chrome-version
    attributes:
      label: Chrome version
      placeholder: e.g. 126.0.6478.127
    validations:
      required: true
  - type: input
    id: extension-version
    attributes:
      label: Extension version
      placeholder: e.g. 1.0.0
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Where does the issue happen?
      options:
        - All YouTube videos
        - Only certain channels
        - Only certain videos
        - Not sure
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      placeholder: Add any other helpful details.
    validations:
      required: false
