name: Feature request
description: Suggest an improvement or new feature.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please do not include personal information, private YouTube account details, or sensitive browser data.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      placeholder: Describe the need or workflow.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What would you like to happen?
      placeholder: Describe the feature or improvement.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Describe any alternatives or workarounds.
    validations:
      required: false
