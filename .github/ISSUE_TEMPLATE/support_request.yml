name: Support request
description: Ask for help using the extension.
title: "[Support]: "
labels:
  - question
body:
  - type: markdown
    attributes:
      value: |
        Please do not include personal information, private YouTube account details, or sensitive browser data.
  - type: textarea
    id: question
    attributes:
      label: What do you need help with?
      placeholder: Describe your question or issue.
    validations:
      required: true
  - type: input
    id: chrome-version
    attributes:
      label: Chrome version
      placeholder: e.g. 126.0.6478.127
    validations:
      required: false
  - type: input
    id: extension-version
    attributes:
      label: Extension version
      placeholder: e.g. 1.0.0
    validations:
      required: false
